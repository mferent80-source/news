<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0f4ff">
<title>Price Alerter — Crypto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:   #f0f4ff;
  --bg2:  #ffffff;
  --bg3:  #f7f9ff;
  --bg4:  #eef1fb;
  --b1:   #dde3f5;
  --b2:   #c8d0ed;
  --t1:   #111827;
  --t2:   #4b5675;
  --t3:   #9aa3c2;
  --acc:  #4f46e5;
  --accl: rgba(79,70,229,.08);
  --accb: rgba(79,70,229,.25);
  --green:#059669; --greenl:rgba(5,150,105,.08); --greenb:rgba(5,150,105,.25);
  --red:  #dc2626; --redl:rgba(220,38,38,.08);    --redb:rgba(220,38,38,.25);
  --gold: #d97706; --goldl:rgba(217,119,6,.08);  --goldb:rgba(217,119,6,.25);
  --cyan: #0891b2; --cyanl:rgba(8,145,178,.07);
  --mono:'DM Mono',monospace;
  --head:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;overflow-x:hidden}
body{font-family:var(--mono);background:var(--bg);color:var(--t1);min-height:100vh;}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 80% 20%, rgba(79,70,229,.04) 0%,transparent 55%),
    radial-gradient(ellipse 40% 50% at 20% 80%, rgba(5,150,105,.03) 0%,transparent 50%);
}

.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:14px 14px 100px;}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:14px;border-bottom:1px solid var(--b1);margin-bottom:20px;gap:8px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,var(--accl),var(--cyanl));
  border:1px solid var(--accb);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 16px var(--accl);
}
.brand-name{font-family:var(--head);font-weight:800;font-size:1.2rem;color:var(--t1);}
.brand-name span{color:var(--acc);}
.brand-sub{font-size:.58rem;color:var(--t3);letter-spacing:.5px;margin-top:1px;}

.notif-status{
  padding:5px 12px;border-radius:8px;font-size:.6rem;font-weight:700;
  cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.8px;
  border:1px solid var(--b2);background:var(--bg2);color:var(--t2);
}
.notif-status.granted{border-color:var(--greenb);background:var(--greenl);color:var(--green);cursor:default;}
.notif-status.denied{border-color:var(--redb);background:var(--redl);color:var(--red);cursor:default;}

/* ── TICKER STRIP ── */
.ticker-strip{
  display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;
  scrollbar-width:none;
}
.ticker-strip::-webkit-scrollbar{display:none;}
.ticker-card{
  background:var(--bg2);border:1px solid var(--b1);border-radius:10px;
  padding:8px 14px;min-width:100px;flex-shrink:0;cursor:pointer;
  transition:all .2s;
}
.ticker-card:hover{border-color:var(--b2);transform:translateY(-1px);}
.ticker-card.active{border-color:var(--accb);background:var(--accl);}
.tc-sym{font-family:var(--head);font-weight:700;font-size:.85rem;color:var(--t1);}
.tc-price{font-size:.7rem;color:var(--t2);margin-top:2px;}
.tc-chg{font-size:.62rem;font-weight:700;margin-top:1px;}
.tc-chg.up{color:var(--green);}
.tc-chg.down{color:var(--red);}

/* ── ADD ALERT FORM ── */
.add-form{
  background:var(--bg2);border:1px solid var(--b1);border-radius:14px;
  padding:18px;margin-bottom:16px;
}
.form-title{
  font-family:var(--head);font-weight:700;font-size:.75rem;
  color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:16px;display:flex;align-items:center;gap:6px;
}
.form-title::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--acc);}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:400px){.form-row{grid-template-columns:1fr;}}

.fg{margin-bottom:12px;}
.fg:last-child{margin-bottom:0;}
.fl{font-size:.58rem;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;}

.inp-wrap{
  display:flex;align-items:center;
  background:var(--bg3);border:1px solid var(--b1);border-radius:9px;
  overflow:hidden;transition:border .15s;
}
.inp-wrap:focus-within{border-color:var(--accb);}
.inp-wrap input,.inp-wrap select{
  flex:1;padding:9px 12px;background:none;border:none;outline:none;
  color:var(--t1);font-size:.78rem;font-family:var(--mono);
}
.inp-wrap input::placeholder{color:var(--t3);}
.inp-wrap select option{background:var(--bg3);}
.inp-suffix{
  padding:0 11px;font-size:.62rem;color:var(--t3);
  border-left:1px solid var(--b1);background:var(--bg4);
  height:100%;display:flex;align-items:center;white-space:nowrap;
}

/* condition buttons */
.cond-group{display:flex;gap:6px;}
.cond-btn{
  flex:1;padding:9px 6px;text-align:center;border-radius:8px;
  font-size:.62rem;font-weight:700;letter-spacing:.5px;
  border:1px solid var(--b1);background:var(--bg3);color:var(--t2);
  cursor:pointer;transition:all .15s;
}
.cond-btn:hover{color:var(--t1);border-color:var(--b2);}
.cond-btn.act-above{border-color:var(--greenb);background:var(--greenl);color:var(--green);}
.cond-btn.act-below{border-color:var(--redb);background:var(--redl);color:var(--red);}
.cond-btn.act-cross{border-color:var(--goldb);background:var(--goldl);color:var(--gold);}
.cond-btn.act-pct{border-color:var(--accb);background:var(--accl);color:var(--acc);}

/* sound toggle */
.toggle-row{display:flex;align-items:center;gap:10px;font-size:.65rem;color:var(--t2);margin-bottom:12px;}
.tog{position:relative;width:30px;height:17px;}
.tog input{display:none;}
.tog-sl{position:absolute;inset:0;background:var(--bg4);border:1px solid var(--b1);border-radius:99px;transition:.2s;}
.tog-sl::before{content:'';position:absolute;left:2px;top:50%;transform:translateY(-50%);width:11px;height:11px;border-radius:50%;background:var(--t3);transition:.2s;}
.tog input:checked+.tog-sl{background:var(--accl);border-color:var(--accb);}
.tog input:checked+.tog-sl::before{background:var(--acc);left:15px;}

.btn-add{
  width:100%;padding:12px;
  background:linear-gradient(135deg,var(--acc),#6b7ef8);
  color:#fff;font-family:var(--head);font-weight:700;font-size:.8rem;
  letter-spacing:1px;text-transform:uppercase;
  border:none;border-radius:10px;cursor:pointer;
  box-shadow:0 4px 18px rgba(79,110,247,.25);
  transition:all .2s;
}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(79,110,247,.35);}
.btn-add:active{transform:translateY(0);}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat{
  background:var(--bg2);border:1px solid var(--b1);border-radius:10px;
  padding:8px 11px;position:relative;overflow:hidden;
}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;}
.stat.s-acc::after{background:var(--acc);}
.stat.s-green::after{background:var(--green);}
.stat.s-red::after{background:var(--red);}
.stat.s-gold::after{background:var(--gold);}
.stat-val{font-family:var(--head);font-weight:800;font-size:1.3rem;line-height:1;}
.stat-lbl{font-size:.52rem;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-top:4px;}

/* ── ALERT CARDS ── */
.alerts-hdr{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.alerts-title{
  font-family:var(--head);font-weight:700;font-size:.8rem;
  color:var(--t2);text-transform:uppercase;letter-spacing:.5px;
}
.btn-clear{
  padding:4px 10px;border-radius:6px;font-size:.58rem;font-weight:600;
  border:1px solid var(--b1);background:var(--bg2);color:var(--t3);
  cursor:pointer;transition:all .15s;
}
.btn-clear:hover{border-color:var(--redb);color:var(--red);}

/* filter tabs */
.ftabs{display:flex;gap:4px;margin-bottom:10px;}
.ftab{
  padding:4px 12px;border-radius:20px;font-size:.6rem;font-weight:600;
  border:1px solid var(--b1);background:var(--bg2);color:var(--t3);
  cursor:pointer;transition:all .15s;
}
.ftab.act{border-color:var(--accb);background:var(--accl);color:var(--acc);}

.alert-card{
  background:var(--bg2);border:1px solid var(--b1);border-radius:12px;
  margin-bottom:8px;overflow:hidden;transition:all .2s;
  animation:slideIn .25s ease;position:relative;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.alert-card:hover{border-color:var(--b2);}
.alert-card.triggered{border-color:var(--green);background:rgba(16,185,129,.04);}
.alert-card.triggered-once{opacity:.6;}

.alert-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px;}
.aa-above{background:var(--green);}
.aa-below{background:var(--red);}
.aa-cross{background:var(--gold);}
.aa-pct{background:var(--acc);}

.alert-body{padding:12px 14px 12px 18px;}
.alert-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.alert-left{flex:1;}
.alert-coin{
  font-family:var(--head);font-weight:800;font-size:1rem;
  display:flex;align-items:center;gap:8px;
}
.alert-cond-badge{
  font-size:.55rem;font-weight:700;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;letter-spacing:.5px;
}
.ab-above{background:var(--greenl);color:var(--green);border:1px solid var(--greenb);}
.ab-below{background:var(--redl);color:var(--red);border:1px solid var(--redb);}
.ab-cross{background:var(--goldl);color:var(--gold);border:1px solid var(--goldb);}
.ab-pct{background:var(--accl);color:var(--acc);border:1px solid var(--accb);}
.alert-price{font-size:.85rem;color:var(--t2);margin-top:3px;}
.alert-price strong{color:var(--t1);font-size:.95rem;}
.alert-note{font-size:.65rem;color:var(--t3);margin-top:4px;font-style:italic;}

.alert-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.alert-actions{display:flex;gap:5px;}
.btn-alert-action{
  padding:4px 9px;border-radius:6px;font-size:.58rem;font-weight:600;
  border:1px solid var(--b1);background:var(--bg3);color:var(--t3);
  cursor:pointer;transition:all .15s;
}
.btn-alert-action:hover{border-color:var(--b2);color:var(--t2);}
.btn-del:hover{border-color:var(--redb);color:var(--red);}
.btn-toggle:hover{border-color:var(--accb);color:var(--acc);}

.alert-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.alert-cur-price{
  font-size:.7rem;font-weight:700;
}
.alert-cur-price.above{color:var(--green);}
.alert-cur-price.below{color:var(--red);}
.alert-distance{font-size:.62rem;color:var(--t3);}
.alert-status{
  font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:2px 6px;border-radius:4px;
}
.as-active{background:var(--accl);color:var(--acc);border:1px solid var(--accb);}
.as-triggered{background:var(--greenl);color:var(--green);border:1px solid var(--greenb);}
.as-paused{background:var(--bg4);color:var(--t3);border:1px solid var(--b1);}

/* progress bar to target */
.progress-wrap{margin-top:8px;}
.progress-track{height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease;}

/* ── HISTORY ── */
.history-section{margin-top:6px;}
.history-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;background:var(--bg2);border:1px solid var(--b1);
  border-radius:8px;margin-bottom:5px;font-size:.65rem;
}
.hi-icon{font-size:1rem;flex-shrink:0;}
.hi-text{flex:1;color:var(--t2);}
.hi-text strong{color:var(--t1);}
.hi-time{font-size:.58rem;color:var(--t3);}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 20px;color:var(--t3);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.25;}
.empty-title{font-family:var(--head);font-weight:700;font-size:.9rem;color:var(--t2);margin-bottom:4px;}
.empty-sub{font-size:.65rem;}

/* ── ALARM OVERLAY ── */
#alarmOverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(240,244,255,.97);backdrop-filter:blur(16px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;
}
#alarmOverlay.show{display:flex;}
.alarm-ring{
  width:90px;height:90px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;margin-bottom:24px;
  animation:ringPulse .7s ease-in-out infinite;
}
.alarm-ring.above{background:rgba(16,185,129,.15);box-shadow:0 0 0 0 rgba(16,185,129,.4);}
.alarm-ring.below{background:rgba(239,68,68,.15);box-shadow:0 0 0 0 rgba(239,68,68,.4);}
@keyframes ringPulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.alarm-label{font-size:.7rem;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.alarm-coin{font-family:var(--head);font-weight:900;font-size:2rem;margin-bottom:6px;}
.alarm-price{font-family:var(--head);font-weight:700;font-size:1.4rem;margin-bottom:4px;}
.alarm-target{font-size:.8rem;color:var(--t2);margin-bottom:8px;}
.alarm-note{font-size:.75rem;color:var(--t2);margin-bottom:32px;font-style:italic;}
.btn-dismiss{
  padding:14px 40px;border-radius:12px;font-family:var(--head);font-weight:800;
  font-size:.85rem;letter-spacing:1px;text-transform:uppercase;
  border:none;cursor:pointer;transition:all .2s;
}
.btn-dismiss.above{background:var(--green);color:#000;}
.btn-dismiss.below{background:var(--red);color:#fff;}

/* toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--b2);border-radius:10px;
  padding:10px 18px;font-size:.7rem;color:var(--t1);
  z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-left:3px solid var(--green);}
.toast.err{border-left:3px solid var(--red);}
</style>
</head>
<body>

<!-- ALARM OVERLAY -->
<div id="alarmOverlay">
  <div class="alarm-ring" id="alarmRing">🔔</div>
  <div class="alarm-label">Alertă declanșată!</div>
  <div class="alarm-coin" id="alarmCoin"></div>
  <div class="alarm-price" id="alarmPrice"></div>
  <div class="alarm-target" id="alarmTarget"></div>
  <div class="alarm-note" id="alarmNote"></div>
  <button class="btn-dismiss" id="alarmDismiss" onclick="dismissAlarm()">✓ Înțeles</button>
</div>

<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div class="brand">
    <div class="brand-icon">🔔</div>
    <div>
      <div class="brand-name">Price <span>Alerter</span></div>
      <div class="brand-sub">Alerte preț crypto · Binance Live · Notificări instant</div>
    </div>
  </div>
  <a href="index.html" style="padding:5px 11px;border-radius:7px;font-size:.6rem;font-weight:600;border:1px solid var(--b1);background:var(--bg2);color:var(--t2);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .15s;" onmouseover="this.style.color='var(--t1)'" onmouseout="this.style.color='var(--t2)'">← Hub</a>
    <div class="notif-status" id="notifStatus" onclick="requestNotif()">🔔 Activează notificări</div>
</div>

<!-- TICKER STRIP -->
<div class="ticker-strip" id="tickerStrip"></div>

<!-- STATS -->
<div class="stats">
  <div class="stat s-acc"><div class="stat-val" id="st-total" style="color:var(--acc)">0</div><div class="stat-lbl">Total alerte</div></div>
  <div class="stat s-green"><div class="stat-val" id="st-active" style="color:var(--green)">0</div><div class="stat-lbl">Active</div></div>
  <div class="stat s-red"><div class="stat-val" id="st-triggered" style="color:var(--red)">0</div><div class="stat-lbl">Declanșate</div></div>
  <div class="stat s-gold"><div class="stat-val" id="st-paused" style="color:var(--gold)">0</div><div class="stat-lbl">Pauzate</div></div>
</div>

<!-- ADD FORM -->
<div class="add-form">
  <div class="form-title">+ Alertă nouă</div>

  <div class="form-row">
    <div>
      <label class="fl">Coin</label>
      <div class="inp-wrap">
        <input id="alertCoin" value="BTC" maxlength="12" oninput="this.value=this.value.toUpperCase()" placeholder="BTC">
        <div class="inp-suffix">/ USDT</div>
      </div>
    </div>
    <div>
      <label class="fl">Preț țintă</label>
      <div class="inp-wrap">
        <input type="number" id="alertPrice" placeholder="ex: 100000" step="any">
        <div class="inp-suffix">USDT</div>
      </div>
    </div>
  </div>

  <div class="fg">
    <label class="fl">Condiție</label>
    <div class="cond-group">
      <div class="cond-btn act-above" id="cb-above" onclick="selectCond('above',this)">⬆ Peste</div>
      <div class="cond-btn" id="cb-below" onclick="selectCond('below',this)">⬇ Sub</div>
      <div class="cond-btn" id="cb-cross" onclick="selectCond('cross',this)">✕ Crossing</div>
      <div class="cond-btn" id="cb-pct" onclick="selectCond('pct',this)">% Variație</div>
    </div>
  </div>

  <div class="form-row">
    <div class="fg" style="margin-bottom:0">
      <label class="fl">Notă (opțional)</label>
      <div class="inp-wrap">
        <input id="alertNote" placeholder="ex: Nivel rezistență major">
      </div>
    </div>
    <div class="fg" style="margin-bottom:0">
      <label class="fl">Repetare</label>
      <div class="inp-wrap">
        <select id="alertRepeat">
          <option value="once">O singură dată</option>
          <option value="always">De fiecare dată</option>
          <option value="3">De 3 ori</option>
        </select>
      </div>
    </div>
  </div>

  <div class="toggle-row" style="margin-top:12px;">
    <label style="display:flex;align-items:center;gap:7px;cursor:pointer;">
      <div class="tog"><input type="checkbox" id="alertSound" checked><div class="tog-sl"></div></div>
      Sunet alertă
    </label>
    <label style="display:flex;align-items:center;gap:7px;cursor:pointer;">
      <div class="tog"><input type="checkbox" id="alertVibrate" checked><div class="tog-sl"></div></div>
      Vibrație (mobil)
    </label>
  </div>

  <button class="btn-add" onclick="addAlert()">🔔 Adaugă Alertă</button>
</div>

<!-- ALERTS LIST -->
<div class="alerts-hdr">
  <div class="alerts-title">📋 Alertele mele</div>
  <button class="btn-clear" onclick="clearTriggered()">Șterge declanșate</button>
</div>

<div class="ftabs">
  <div class="ftab act" onclick="setTab('all',this)">Toate</div>
  <div class="ftab" onclick="setTab('active',this)">Active</div>
  <div class="ftab" onclick="setTab('triggered',this)">Declanșate</div>
  <div class="ftab" onclick="setTab('paused',this)">Pauzate</div>
</div>

<div id="alertsList"></div>

<!-- HISTORY -->
<div class="history-section" id="historySection" style="display:none;">
  <div class="alerts-title" style="margin-bottom:8px;">📜 Istoric declanșări</div>
  <div id="historyList"></div>
</div>

<div class="toast" id="toast"></div>
</div>

<script>
let alerts = JSON.parse(localStorage.getItem('price_alerts') || '[]');
let history = JSON.parse(localStorage.getItem('price_history') || '[]');
let prices = {}; // coin -> {price, chg}
let selectedCond = 'above';
let currentTab = 'all';
let audioCtx = null;
let activeAlarmId = null;

const WATCH_COINS = ['BTC','ETH','SOL','BNB','XRP','HYPE','DOGE','ADA'];

// ── INIT ──
initAudio();
updateNotifBtn();
renderAlerts();
renderStats();
fetchAllPrices();
setInterval(fetchAllPrices, 10000); // every 10s
renderHistory();

// ── AUDIO ──
function initAudio(){
  document.addEventListener('click', () => {
    if(!audioCtx) try{ audioCtx = new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }, {once:true});
}
function playAlert(type='above'){
  if(!audioCtx) return;
  const freqs = type==='above' ? [523,659,784,1047] : [784,659,523,392];
  freqs.forEach((f,i) => {
    try{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.15, audioCtx.currentTime+i*.12);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+i*.12+.18);
      o.start(audioCtx.currentTime+i*.12);
      o.stop(audioCtx.currentTime+i*.12+.18);
    }catch(e){}
  });
}

// ── NOTIFICATIONS ──
function updateNotifBtn(){
  const b = document.getElementById('notifStatus');
  if(!('Notification' in window)){ b.textContent='🔕 N/A'; b.className='notif-status denied'; return; }
  if(Notification.permission==='granted'){ b.textContent='🔔 Notificări active'; b.className='notif-status granted'; }
  else if(Notification.permission==='denied'){ b.textContent='🚫 Notificări blocate'; b.className='notif-status denied'; }
}
async function requestNotif(){
  if(!('Notification' in window)||Notification.permission!=='default') return;
  await Notification.requestPermission();
  updateNotifBtn();
}
function sendNotif(title, body){
  if(Notification.permission==='granted'){
    try{ new Notification('🔔 '+title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23080b12"/><text y="70" x="50" text-anchor="middle" font-size="60">🔔</text></svg>'}); }catch(e){}
  }
}

// ── FETCH PRICES ──
async function fetchAllPrices(){
  const coins = [...new Set([...WATCH_COINS, ...alerts.map(a=>a.coin)])];
  try{
    const res = await fetch('https://api.binance.com/api/v3/ticker/24hr', {signal:AbortSignal.timeout(6000)});
    if(!res.ok) return;
    const data = await res.json();
    data.forEach(t => {
      const coin = t.symbol.replace('USDT','');
      if(coins.includes(coin)){
        prices[coin] = {price: parseFloat(t.lastPrice), chg: parseFloat(t.priceChangePercent)};
      }
    });
    renderTicker();
    checkAlerts();
    renderAlerts();
  }catch(e){}
}

// ── TICKER ──
function renderTicker(){
  const strip = document.getElementById('tickerStrip');
  strip.innerHTML = WATCH_COINS.map(coin => {
    const p = prices[coin];
    if(!p) return `<div class="ticker-card"><div class="tc-sym">${coin}</div><div class="tc-price">—</div></div>`;
    return `<div class="ticker-card" onclick="document.getElementById('alertCoin').value='${coin}'">
      <div class="tc-sym">${coin}</div>
      <div class="tc-price">${fmtPrice(p.price)}</div>
      <div class="tc-chg ${p.chg>=0?'up':'down'}">${p.chg>=0?'+':''}${p.chg.toFixed(2)}%</div>
    </div>`;
  }).join('');
}

// ── CHECK ALERTS ──
function checkAlerts(){
  let triggered = false;
  alerts.forEach(a => {
    if(!a.active || a.status === 'triggered') return;
    if(a.repeat === 'once' && a.triggerCount > 0) return;
    const p = prices[a.coin];
    if(!p) return;
    const cur = p.price;
    let fire = false;

    if(a.cond === 'above' && cur >= a.target) fire = true;
    else if(a.cond === 'below' && cur <= a.target) fire = true;
    else if(a.cond === 'cross'){
      const prev = a.lastPrice || cur;
      if((prev < a.target && cur >= a.target)||(prev > a.target && cur <= a.target)) fire = true;
    } else if(a.cond === 'pct'){
      const pctChange = Math.abs((cur - a.basePrice) / a.basePrice * 100);
      if(pctChange >= a.target) fire = true;
    }

    a.lastPrice = cur;

    if(fire){
      a.triggerCount = (a.triggerCount||0) + 1;
      a.lastTriggered = Date.now();
      const maxTriggers = a.repeat==='once'?1:a.repeat==='3'?3:Infinity;
      if(a.triggerCount >= maxTriggers) a.status = 'triggered';

      // Add to history
      history.unshift({
        coin:a.coin, price:cur, target:a.target, cond:a.cond,
        note:a.note, time:Date.now(), dir:a.cond==='below'?'below':'above'
      });
      if(history.length > 50) history.pop();
      localStorage.setItem('price_history', JSON.stringify(history));

      // Trigger alarm
      triggerAlarm(a, cur);
      triggered = true;
    }
  });

  if(triggered){
    localStorage.setItem('price_alerts', JSON.stringify(alerts));
    renderStats();
    renderHistory();
  }
}

function triggerAlarm(alert, price){
  activeAlarmId = alert.id;
  const isAbove = alert.cond !== 'below';
  const ring = document.getElementById('alarmRing');
  ring.textContent = isAbove ? '🚀' : '⚠️';
  ring.className = 'alarm-ring ' + (isAbove?'above':'below');
  document.getElementById('alarmCoin').textContent = alert.coin + '/USDT';
  document.getElementById('alarmCoin').style.color = isAbove ? 'var(--green)' : 'var(--red)';
  document.getElementById('alarmPrice').textContent = fmtPrice(price);
  document.getElementById('alarmPrice').style.color = isAbove ? 'var(--green)' : 'var(--red)';
  document.getElementById('alarmTarget').textContent = `Țintă: ${fmtPrice(alert.target)} (${alert.cond.toUpperCase()})`;
  document.getElementById('alarmNote').textContent = alert.note || '';
  document.getElementById('alarmDismiss').className = 'btn-dismiss ' + (isAbove?'above':'below');
  document.getElementById('alarmOverlay').classList.add('show');

  if(alert.sound) playAlert(isAbove?'above':'below');
  if(alert.vibrate && navigator.vibrate) navigator.vibrate([300,100,300,100,500]);
  sendNotif(`${alert.coin} ${alert.cond === 'below' ? 'SUB' : 'PESTE'} ${fmtPrice(alert.target)}`, `Preț curent: ${fmtPrice(price)}${alert.note ? '\n'+alert.note : ''}`);
}

function dismissAlarm(){
  document.getElementById('alarmOverlay').classList.remove('show');
  activeAlarmId = null;
}

// ── ADD ALERT ──
function selectCond(c, btn){
  selectedCond = c;
  document.querySelectorAll('.cond-btn').forEach(b => b.classList.remove('act-above','act-below','act-cross','act-pct'));
  btn.classList.add('act-'+c);
}

function addAlert(){
  const coin = document.getElementById('alertCoin').value.trim().toUpperCase();
  const target = parseFloat(document.getElementById('alertPrice').value);
  const note = document.getElementById('alertNote').value.trim();
  const repeat = document.getElementById('alertRepeat').value;
  const sound = document.getElementById('alertSound').checked;
  const vibrate = document.getElementById('alertVibrate').checked;

  if(!coin || !target || isNaN(target)){ showToast('Completează coin și prețul!','err'); return; }

  const cur = prices[coin]?.price || 0;
  alerts.unshift({
    id: Date.now().toString(),
    coin, target, cond: selectedCond, note, repeat, sound, vibrate,
    active: true, status: 'active',
    triggerCount: 0, lastPrice: cur, basePrice: cur,
    created: Date.now()
  });

  localStorage.setItem('price_alerts', JSON.stringify(alerts));
  document.getElementById('alertPrice').value = '';
  document.getElementById('alertNote').value = '';
  renderAlerts();
  renderStats();
  showToast(`Alertă ${coin} adăugată ✓`);

  // Start fetching this coin if not already
  fetchAllPrices();
}

// ── RENDER ALERTS ──
function setTab(t, el){
  currentTab = t;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('act'));
  el.classList.add('act');
  renderAlerts();
}

function renderAlerts(){
  const list = document.getElementById('alertsList');
  let filtered = [...alerts];
  if(currentTab==='active') filtered = filtered.filter(a=>a.active && a.status==='active');
  else if(currentTab==='triggered') filtered = filtered.filter(a=>a.status==='triggered');
  else if(currentTab==='paused') filtered = filtered.filter(a=>!a.active);

  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🔕</div><div class="empty-title">Nicio alertă${currentTab!=='all'?' în această categorie':''}</div><div class="empty-sub">Adaugă o alertă mai sus</div></div>`;
    return;
  }

  const condMap = {
    above:{cls:'aa-above',badge:'ab-above',lbl:'PESTE'},
    below:{cls:'aa-below',badge:'ab-below',lbl:'SUB'},
    cross:{cls:'aa-cross',badge:'ab-cross',lbl:'CROSSING'},
    pct:  {cls:'aa-pct',  badge:'ab-pct',  lbl:'% VARIAȚIE'},
  };
  const condIcon = {above:'⬆',below:'⬇',cross:'✕',pct:'%'};

  list.innerHTML = filtered.map(a => {
    const cm = condMap[a.cond] || condMap.above;
    const p = prices[a.coin];
    const cur = p?.price || 0;
    const dist = cur && a.target ? ((a.target-cur)/cur*100) : 0;
    const progress = cur && a.target ? Math.min(100, Math.max(0,
      a.cond==='above' ? (cur/a.target*100) : (a.target/cur*100)
    )) : 0;
    const statusCls = a.status==='triggered'?'as-triggered':!a.active?'as-paused':'as-active';
    const statusLbl = a.status==='triggered'?'Declanșat':!a.active?'Pauzat':'Activ';

    return `<div class="alert-card${a.status==='triggered'?' triggered':''}">
      <div class="alert-accent ${cm.cls}"></div>
      <div class="alert-body">
        <div class="alert-top">
          <div class="alert-left">
            <div class="alert-coin">
              ${a.coin}
              <span class="alert-cond-badge ${cm.badge}">${condIcon[a.cond]} ${cm.lbl}</span>
            </div>
            <div class="alert-price"><strong>${fmtPrice(a.target)}</strong></div>
            ${a.note?`<div class="alert-note">"${a.note}"</div>`:''}
          </div>
          <div class="alert-right">
            <div class="alert-actions">
              <button class="btn-alert-action btn-toggle" onclick="toggleAlert('${a.id}')">${a.active&&a.status!=='triggered'?'⏸':'▶'}</button>
              <button class="btn-alert-action btn-del" onclick="deleteAlert('${a.id}')">✕</button>
            </div>
            <span class="alert-status ${statusCls}">${statusLbl}</span>
          </div>
        </div>
        <div class="alert-meta">
          ${cur?`<span class="alert-cur-price ${cur>=a.target?'above':'below'}">${fmtPrice(cur)}</span>`:''}
          ${cur&&a.cond!=='pct'?`<span class="alert-distance">${dist>=0?'+':''}${dist.toFixed(2)}% față de țintă</span>`:''}
          ${a.triggerCount>0?`<span style="font-size:.58rem;color:var(--t3)">Declanșat ${a.triggerCount}×</span>`:''}
        </div>
        ${cur&&a.status==='active'?`
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" style="width:${progress}%;background:${a.cond==='below'?'var(--red)':'var(--green)'}"></div>
          </div>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleAlert(id){
  const a = alerts.find(a=>a.id===id);
  if(!a) return;
  if(a.status==='triggered'){ a.status='active'; a.triggerCount=0; }
  a.active = !a.active;
  localStorage.setItem('price_alerts', JSON.stringify(alerts));
  renderAlerts(); renderStats();
}
function deleteAlert(id){
  alerts = alerts.filter(a=>a.id!==id);
  localStorage.setItem('price_alerts', JSON.stringify(alerts));
  renderAlerts(); renderStats();
  showToast('Alertă ștearsă');
}
function clearTriggered(){
  alerts = alerts.filter(a=>a.status!=='triggered');
  localStorage.setItem('price_alerts', JSON.stringify(alerts));
  renderAlerts(); renderStats();
  showToast('Alerte declanșate șterse');
}

function renderStats(){
  document.getElementById('st-total').textContent = alerts.length;
  document.getElementById('st-active').textContent = alerts.filter(a=>a.active&&a.status==='active').length;
  document.getElementById('st-triggered').textContent = alerts.filter(a=>a.status==='triggered').length;
  document.getElementById('st-paused').textContent = alerts.filter(a=>!a.active).length;
}

function renderHistory(){
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if(!history.length){ sec.style.display='none'; return; }
  sec.style.display='block';
  list.innerHTML = history.slice(0,15).map(h => `
    <div class="history-item">
      <div class="hi-icon">${h.dir==='above'?'🚀':'⚠️'}</div>
      <div class="hi-text">
        <strong>${h.coin}</strong> a ${h.dir==='above'?'depășit':'scăzut sub'} <strong>${fmtPrice(h.target)}</strong>
        — preț: ${fmtPrice(h.price)}${h.note?` · "${h.note}"` : ''}
      </div>
      <div class="hi-time">${timeAgo(h.time)}</div>
    </div>
  `).join('');
}

// ── UTILS ──
function fmtPrice(p){
  if(!p||isNaN(p)) return '—';
  if(p>=10000) return '$'+p.toLocaleString('en',{maximumFractionDigits:0});
  if(p>=100)   return '$'+p.toFixed(2);
  if(p>=1)     return '$'+p.toFixed(4);
  return '$'+p.toFixed(6);
}
function timeAgo(ts){
  const diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return diff+'s';
  if(diff<3600) return Math.floor(diff/60)+'m';
  if(diff<86400) return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'z';
}
let toastT;
function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
